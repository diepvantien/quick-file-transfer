<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Send Files - Quick File Transfer</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header class="header">
            <button class="back-btn" id="backBtn">
                <span class="material-icons">arrow_back</span>
            </button>
            <h1 class="logo">
                <span class="material-icons">cloud_upload</span>
                Send Files
            </h1>
        </header>

        <div class="main-card">
            <!-- File Upload Section -->
            <div class="upload-section" id="uploadSection">
                <div class="upload-area" id="uploadArea">
                    <div class="upload-icon">
                        <span class="material-icons">cloud_upload</span>
                    </div>
                    <h3>Drag & Drop Files Here</h3>
                    <p>or click to select files</p>
                    <input type="file" id="fileInput" multiple hidden>
                    <button class="select-btn" id="selectBtn">Select Files</button>
                </div>
            </div>

            <!-- File List Section -->
            <div class="file-list" id="fileList" style="display: none;">
                <h3>Selected Files</h3>
                <div class="files-container" id="filesContainer"></div>
                <div class="upload-actions">
                    <button class="upload-btn" id="uploadBtn">
                        <span class="material-icons">send</span>
                        Upload Files
                    </button>
                    <button class="clear-btn" id="clearBtn">
                        <span class="material-icons">clear</span>
                        Clear
                    </button>
                </div>
            </div>

            <!-- QR Code Section -->
            <div class="qr-section" id="qrSection" style="display: none;">
                <h3>Share this QR Code</h3>
                <div class="qr-container">
                    <div class="qr-code" id="qrCode"></div>
                    <div class="room-info">
                        <p>Room Code: <strong id="roomCode"></strong></p>
                        <button class="copy-btn" id="copyBtn">
                            <span class="material-icons">content_copy</span>
                            Copy Code
                        </button>
                    </div>
                </div>
            </div>

            <!-- Upload Progress Section -->
            <div class="progress-section" id="progressSection" style="display: none;">
                <h3>Upload Progress</h3>
                <div class="progress-container">
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                    <div class="progress-info">
                        <span id="progressPercent">0%</span>
                        <span id="progressSpeed">0 KB/s</span>
                    </div>
                </div>
                <div class="upload-stats">
                    <div class="stat-item">
                        <span class="stat-label">Uploaded</span>
                        <span class="stat-value" id="uploadedSize">0 MB</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Total</span>
                        <span class="stat-value" id="totalSize">0 MB</span>
                    </div>
                </div>
            </div>
        </div>

        <footer class="footer">
            <p>Files will be available for 30 minutes after upload</p>
        </footer>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="js/qrcode.min.js"></script>
    <script src="js/main.js"></script>
    <script src="js/sender.js"></script>
    <script src="js/stats.js"></script>
</body>
</html>
