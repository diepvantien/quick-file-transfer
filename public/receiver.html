<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Receive Files - Quick File Transfer</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header class="header">
            <button class="back-btn" id="backBtn">
                <span class="material-icons">arrow_back</span>
            </button>
            <h1 class="logo">
                <span class="material-icons">cloud_download</span>
                Receive Files
            </h1>
        </header>

        <div class="main-card">
            <!-- Room Input Section -->
            <div class="room-input-section" id="roomInputSection">
                <h3>Enter Room Code</h3>
                <div class="input-group">
                    <input type="text" id="roomCodeInput" placeholder="Enter 6-digit room code" maxlength="6">
                    <button class="join-btn" id="joinBtn">
                        <span class="material-icons">login</span>
                        Join Room
                    </button>
                </div>
                <div class="divider">
                    <span>or</span>
                </div>
                <div class="qr-scanner-section">
                    <button class="scan-btn" id="scanBtn">
                        <span class="material-icons">qr_code_scanner</span>
                        Scan QR Code
                    </button>
                    <div class="qr-scanner" id="qrScanner" style="display: none;">
                        <video id="qrVideo" autoplay></video>
                        <canvas id="qrCanvas" style="display: none;"></canvas>
                        <button class="stop-scan-btn" id="stopScanBtn">
                            <span class="material-icons">stop</span>
                            Stop Scanning
                        </button>
                    </div>
                </div>
            </div>

            <!-- Files List Section -->
            <div class="files-section" id="filesSection" style="display: none;">
                <h3>Available Files</h3>
                <div class="room-info">
                    <p>Room: <strong id="currentRoom"></strong></p>
                    <div class="connection-status" id="connectionStatus">
                        <span class="material-icons">wifi</span>
                        Connected
                    </div>
                </div>
                <div class="available-files" id="availableFiles"></div>
            </div>

            <!-- Download Progress Section -->
            <div class="download-progress-section" id="downloadProgressSection" style="display: none;">
                <h3>Download Progress</h3>
                <div class="progress-container">
                    <div class="progress-bar">
                        <div class="progress-fill" id="downloadProgressFill"></div>
                    </div>
                    <div class="progress-info">
                        <span id="downloadProgressPercent">0%</span>
                        <span id="downloadProgressSpeed">0 KB/s</span>
                    </div>
                </div>
                <div class="download-stats">
                    <div class="stat-item">
                        <span class="stat-label">Downloaded</span>
                        <span class="stat-value" id="downloadedSize">0 MB</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Total</span>
                        <span class="stat-value" id="downloadTotalSize">0 MB</span>
                    </div>
                </div>
            </div>
        </div>

        <footer class="footer">
            <p>Enter the room code shared by the sender</p>
        </footer>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="js/main.js"></script>
    <script src="js/receiver.js"></script>
    <script src="js/stats.js"></script>
</body>
</html>
